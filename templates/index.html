<!DOCTYPE html>
<html>
<head>
    <title>PyCalc - Pixel Calculator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #4a4a4a;
            margin: 0;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        .container {
            display: flex;
            gap: 20px;
            max-width: 800px;
            width: 100%;
            padding: 20px;
        }
        
        /* Pixel art effect for all elements */
        .calculator, .history-panel {
            background: #d3d3d3;
            border: 4px solid #2c2c2c;
            image-rendering: pixelated;
            box-shadow: 8px 8px 0 #1a1a1a;
        }
        
        .calculator {
            padding: 20px;
            flex: 2;
        }
        
        .history-panel {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            background: #c0c0c0;
        }
        
        .history-panel h3 {
            margin-top: 0;
            color: #2c2c2c;
            font-size: 14px;
            text-align: center;
            border-bottom: 4px solid #2c2c2c;
            padding-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #999999;
        }
        
        .history-item {
            padding: 12px 8px;
            margin: 10px 0;
            background: #e8e8e8;
            border: 3px solid #2c2c2c;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: #2c2c2c;
            cursor: pointer;
            transition: all 0.1s step-end;
            box-shadow: 4px 4px 0 #666666;
            word-break: break-all;
        }
        
        .history-item:hover {
            background: #ff9933;
            color: #2c2c2c;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #666666;
            border-color: #ff9933;
        }
        
        .clear-history {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #ff9933;
            color: #2c2c2c;
            border: 3px solid #2c2c2c;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 4px 4px 0 #666666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .clear-history:hover {
            background: #ffb366;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #666666;
        }
        
        #display {
            width: 100%;
            height: 70px;
            font-family: 'Press Start 2P', cursive;
            font-size: 20px;
            text-align: right;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f0f0;
            border: 4px solid #2c2c2c;
            color: #2c2c2c;
            box-sizing: border-box;
            box-shadow: inset 4px 4px 0 #999999;
            letter-spacing: 2px;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        
        button {
            padding: 18px 5px;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            border: 3px solid #2c2c2c;
            background: #f0f0f0;
            color: #2c2c2c;
            cursor: pointer;
            box-shadow: 4px 4px 0 #666666;
            transition: all 0.1s step-end;
            text-transform: uppercase;
            image-rendering: pixelated;
        }
        
        button:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #666666;
            background: #ffffff;
        }
        
        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0 #666666;
        }
        
        .operator {
            background: #2c2c2c;
            color: #ff9933;
            border-color: #ff9933;
        }
        
        .operator:hover {
            background: #404040;
            color: #ffb366;
        }
        
        .equal {
            background: #ff9933;
            color: #2c2c2c;
            grid-column: span 2;
            border-color: #2c2c2c;
        }
        
        .equal:hover {
            background: #ffb366;
        }
        
        .python-badge {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .python-badge span {
            background: #2c2c2c;
            color: #ff9933;
            padding: 8px 15px;
            border: 3px solid #ff9933;
            font-size: 12px;
            letter-spacing: 2px;
            box-shadow: 4px 4px 0 #666666;
            display: inline-block;
        }
        
        /* Pixelated scrollbar */
        .history-panel::-webkit-scrollbar {
            width: 12px;
        }
        
        .history-panel::-webkit-scrollbar-track {
            background: #e8e8e8;
            border: 2px solid #2c2c2c;
        }
        
        .history-panel::-webkit-scrollbar-thumb {
            background: #ff9933;
            border: 2px solid #2c2c2c;
        }
        
        .history-panel::-webkit-scrollbar-thumb:hover {
            background: #ffb366;
        }
        
        /* Terminal-style cursor blink */
        #display {
            caret-color: #ff9933;
            animation: blink 1s step-end infinite;
        }
        
        @keyframes blink {
            50% {
                border-color: #ff9933;
            }
        }
        
        /* Vintage paper texture */
        .calculator, .history-panel {
            background-image: 
                linear-gradient(45deg, #d3d3d3 2px, transparent 2px),
                linear-gradient(-45deg, #d3d3d3 2px, transparent 2px);
            background-size: 4px 4px;
        }
        
        /* Responsive design */
        @media (max-width: 700px) {
            .container {
                flex-direction: column;
            }
            
            button {
                padding: 15px 3px;
                font-size: 14px;
            }
            
            #display {
                font-size: 16px;
                height: 60px;
            }
        }

        .history-item::before {
            content: ">";
            color: #ff9933;
            margin-right: 8px;
            font-weight: bold;
        }

        .history-item {
            padding-left: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Pixel Calculator -->
        <div class="calculator">
            <div class="python-badge">
                <span>🐍 PyWebCalcPixel</span>
            </div>
            
            <input type="text" id="display" readonly value="0">
            
            <div class="buttons">
                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button class="operator" onclick="appendToDisplay('/')">/</button>
                
                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button class="operator" onclick="appendToDisplay('*')">*</button>
                
                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button class="operator" onclick="appendToDisplay('-')">-</button>
                
                <button onclick="appendToDisplay('0')">0</button>
                <button onclick="appendToDisplay('.')">.</button>
                <button onclick="clearDisplay()">C</button>
                <button class="operator" onclick="appendToDisplay('+')">+</button>
                
                <button class="equal" onclick="calculate()">=</button>
            </div>
        </div>
        
        <!-- History Panel -->
        <div class="history-panel">
            <h3>📟 HISTORY</h3>
            <div id="history-list">
                {% for item in history %}
                    <div class="history-item" onclick="useHistory('{{ item.split(' = ')[0] }}')">
                        {{ item }}
                    </div>
                {% endfor %}
            </div>
            <button class="clear-history" onclick="clearHistory()">⌫ CLEAR</button>
        </div>
    </div>

    <script>
        function appendToDisplay(value) {
            const display = document.getElementById('display');
            if (display.value === '0' && value !== '.') {
                display.value = value;
            } else {
                display.value += value;
            }
        }
        
        function clearDisplay() {
            document.getElementById('display').value = '0';
        }
        
        function useHistory(expression) {
            document.getElementById('display').value = expression;
        }
        
        function updateHistory(historyItems) {
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';
            
            historyItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.onclick = () => useHistory(item.split(' = ')[0]);
                div.innerHTML = item;
                historyList.appendChild(div);
            });
        }
        
        function calculate() {
            const expression = document.getElementById('display').value;
            
            if (!expression || expression === '0') return;
            
            fetch('/calculate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({expression: expression})
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('display').value = 'ERROR';
                    setTimeout(() => {
                        document.getElementById('display').value = '0';
                    }, 1000);
                } else {
                    document.getElementById('display').value = data.result;
                    if (data.history) {
                        updateHistory(data.history);
                    }
                }
            });
        }
        
        function clearHistory() {
            fetch('/clear-history', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                updateHistory(data.history);
            });
        }
        
        // Keyboard support
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            const display = document.getElementById('display');
            
            if ('0123456789'.includes(key)) {
                if (display.value === '0') {
                    display.value = key;
                } else {
                    appendToDisplay(key);
                }
            } else if ('+-*/.'.includes(key)) {
                appendToDisplay(key);
            } else if (key === 'Enter') {
                calculate();
            } else if (key === 'Escape') {
                clearDisplay();
            } else if (key === 'Delete') {
                clearHistory();
            } else if (key === 'Backspace') {
                display.value = display.value.slice(0, -1) || '0';
            }
            
            // Prevent default for calculator keys
            if ('0123456789+-*/.'.includes(key) || key === 'Enter' || key === 'Escape') {
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
