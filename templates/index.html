<!DOCTYPE html>
<html>
<head>
    <title>PyCalc - Pixel Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="python-badge">
                <span>🐍 PyWebCalcPixel</span>
            </div>
            
            <input type="text" id="display" readonly value="0">
            
            <div class="buttons">
                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button class="operator" onclick="appendToDisplay('/')">/</button>
                
                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button class="operator" onclick="appendToDisplay('*')">*</button>
                
                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button class="operator" onclick="appendToDisplay('-')">-</button>
                
                <button onclick="appendToDisplay('0')">0</button>
                <button onclick="appendToDisplay('.')">.</button>
                <button onclick="clearDisplay()">C</button>
                <button class="operator" onclick="appendToDisplay('+')">+</button>
                
                <button class="equal" onclick="calculate()">=</button>
            </div>
        </div>
        
        <div class="history-panel">
            <h3>📟 HISTORY</h3>
            <div id="history-list">
                {% for item in history %}
                    <div class="history-item" onclick="useHistory('{{ item.split(' = ')[0] }}')">
                        {{ item }}
                    </div>
                {% endfor %}
            </div>
            <button class="clear-history" onclick="clearHistory()">⌫ CLEAR</button>
        </div>
    </div>

    <script>
        const operators = '+-*/';
        
        function appendToDisplay(value) {
            const display = document.getElementById('display');
            const currentValue = display.value;
            const lastChar = currentValue.slice(-1);
            
            // Handle operator replacement
            if (operators.includes(value)) {
                if (operators.includes(lastChar)) {
                    // Replace the last operator with the new one
                    display.value = currentValue.slice(0, -1) + value;
                    return;
                }
                // Prevent starting with operator (except minus for negative numbers)
                if (currentValue === '0' && value !== '-') {
                    return;
                }
            }
            
            // Handle decimal points
            if (value === '.') {
                // Get the current number being typed
                const parts = currentValue.split(/[+\-*/]/);
                const currentNumber = parts[parts.length - 1];
                
                // Prevent multiple decimals in the same number
                if (currentNumber.includes('.')) {
                    return;
                }
            }
            
            // Update display
            if (display.value === '0' && value !== '.') {
                display.value = value;
            } else {
                display.value += value;
            }
        }
        
        function clearDisplay() {
            document.getElementById('display').value = '0';
        }
        
        function useHistory(expression) {
            document.getElementById('display').value = expression;
        }
        
        function updateHistory(historyItems) {
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';
            
            historyItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.onclick = () => useHistory(item.split(' = ')[0]);
                div.innerHTML = item;
                historyList.appendChild(div);
            });
        }
        
        function calculate() {
            const expression = document.getElementById('display').value;
            
            if (!expression || expression === '0') return;
            
            // Final validation before sending
            const lastChar = expression.slice(-1);
            if (operators.includes(lastChar)) {
                document.getElementById('display').value = 'ERROR';
                setTimeout(() => {
                    document.getElementById('display').value = '0';
                }, 1000);
                return;
            }
            
            fetch('/calculate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({expression: expression})
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('display').value = 'ERROR';
                    setTimeout(() => {
                        document.getElementById('display').value = '0';
                    }, 1000);
                } else {
                    document.getElementById('display').value = data.result;
                    if (data.history) {
                        updateHistory(data.history);
                    }
                }
            });
        }
        
        function clearHistory() {
            fetch('/clear-history', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                updateHistory(data.history);
            });
        }
        
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            const display = document.getElementById('display');
            const currentValue = display.value;
            const lastChar = currentValue.slice(-1);
            
            if ('0123456789'.includes(key)) {
                if (display.value === '0') {
                    display.value = key;
                } else {
                    appendToDisplay(key);
                }
            } else if ('+-*/'.includes(key)) {
                // Handle operator replacement via keyboard
                if (operators.includes(lastChar)) {
                    display.value = currentValue.slice(0, -1) + key;
                } else {
                    appendToDisplay(key);
                }
            } else if (key === '.') {
                // Prevent multiple decimals
                const parts = currentValue.split(/[+\-*/]/);
                const currentNumber = parts[parts.length - 1];
                if (!currentNumber.includes('.')) {
                    appendToDisplay(key);
                }
            } else if (key === 'Enter') {
                calculate();
            } else if (key === 'Escape') {
                clearDisplay();
            } else if (key === 'Delete') {
                clearHistory();
            } else if (key === 'Backspace') {
                display.value = display.value.slice(0, -1) || '0';
            }
            
            if ('0123456789+-*/.'.includes(key) || key === 'Enter' || key === 'Escape') {
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
